<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>KarlCON · Pepper's Ghost Hologram</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}

/* ── SETUP SCREEN ── */
#setup{
  position:fixed;inset:0;
  background:#080910;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;
  font-family:monospace;
  color:#0fd8ec;
  padding:24px;gap:14px;
}
#setup h1{font-size:16px;letter-spacing:3px;text-transform:uppercase;font-weight:700}
#setup .sub{font-size:10px;letter-spacing:1.5px;color:rgba(0,210,230,.4);margin-top:-8px}
.sep{width:100%;max-width:380px;height:1px;background:rgba(0,210,230,.07)}
#setup label{font-size:9.5px;letter-spacing:1px;color:rgba(0,210,230,.45);align-self:flex-start;max-width:380px;width:100%}
#setup input[type=text]{
  width:100%;max-width:380px;
  background:rgba(0,210,230,.05);border:1px solid rgba(0,210,230,.2);border-radius:6px;
  color:#0fd8ec;font-family:monospace;font-size:11px;padding:10px 14px;outline:none;
}
#setup input[type=text]:focus{border-color:rgba(0,210,230,.5)}
#ws-status{font-size:9px;letter-spacing:1.5px;color:rgba(0,210,230,.3)}
#ws-status.ok{color:#00e898}
#ws-status.err{color:#f04460}

.btn{
  width:100%;max-width:380px;padding:12px;
  border-radius:6px;cursor:pointer;
  font-family:monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  transition:all .2s;
}
.btn-primary{
  background:rgba(0,210,230,.08);border:1px solid rgba(0,210,230,.35);color:#0fd8ec;
}
.btn-primary:active{background:rgba(0,210,230,.22)}
.btn-ghost{
  background:transparent;border:1px solid rgba(0,210,230,.12);color:rgba(0,210,230,.4);
}
.btn-ghost:active{border-color:rgba(0,210,230,.4);color:rgba(0,210,230,.8)}
.info-row{
  width:100%;max-width:380px;display:flex;justify-content:space-between;
  font-size:9px;color:rgba(0,210,230,.3);letter-spacing:.8px;
}

/* ── HOLOGRAM VIEW ── */
#holo-wrap{position:fixed;inset:0;background:#000;display:none}
canvas#holo-canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}

/* ── HUD ── */
#hud{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.85);border-top:1px solid rgba(0,210,230,.08);
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;font-family:monospace;font-size:9px;
  color:rgba(0,210,230,.35);letter-spacing:1px;z-index:50;
  transition:opacity .3s;
}
#hud.hidden{opacity:0;pointer-events:none}
.dot{width:5px;height:5px;border-radius:50%;background:#f04460;flex-shrink:0}
.dot.on{background:#00e898;box-shadow:0 0 5px #00e898}
#btn-exit{background:transparent;border:none;color:rgba(0,210,230,.3);
  font-family:monospace;font-size:9px;letter-spacing:1px;cursor:pointer;padding:4px 8px}
#btn-exit:active{color:#f04460}

/* FPS */
#fps{position:fixed;top:8px;right:10px;font-family:monospace;font-size:8px;
  color:rgba(0,210,230,.18);z-index:50;pointer-events:none;letter-spacing:1px}
</style>
</head>
<body>

<!-- ═══ SETUP SCREEN ═══ -->
<div id="setup">
  <h1>◈ KarlCON</h1>
  <div class="sub">PEPPER'S GHOST · BIM HOLOGRAM · v2.0</div>
  <div class="sep"></div>

  <label>WEBSOCKET SERVER URL</label>
  <input type="text" id="ws-url" value="ws://localhost:8765/ws" placeholder="wss://your-relay-url"/>
  <div id="ws-status">● NOT CONNECTED</div>

  <button class="btn btn-ghost" id="btn-test">◇ TEST CONNECTION</button>
  <button class="btn btn-primary" id="btn-launch">▶ LAUNCH HOLOGRAM</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" id="btn-demo">◈ DEMO MODE (no server)</button>

  <div class="info-row">
    <span>Place phone flat · Pyramid on top</span>
    <span>Portrait preferred</span>
  </div>
</div>

<!-- ═══ HOLOGRAM VIEW ═══ -->
<div id="holo-wrap">
  <canvas id="holo-canvas"></canvas>
  <div id="fps">--fps</div>
  <div id="hud">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="dot" id="ws-dot"></div>
      <span id="ws-label">WS OFFLINE</span>
    </div>
    <span id="bim-info">NO BIM</span>
    <button id="btn-exit">✕ EXIT</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════════
// KarlCON Pepper's Ghost — SINGLE RENDERER, 4 VIEWPORTS
// ════════════════════════════════════════════════════════════════════════
//
// Pepper's Ghost 4-panel portrait layout on phone (e.g. 720×1600):
//
//  ┌─────────────────────┐  y=0
//  │      NORTH (top)    │  h = half = SW/2
//  ├──────────┬──────────┤  y=half
//  │  WEST    │  EAST    │  h = mid = SH - 2*half
//  │ (left)   │ (right)  │
//  ├──────────┴──────────┤  y=half+mid
//  │      SOUTH (bot)    │  h = half
//  └─────────────────────┘  y=SH
//
// One WebGLRenderer fills the whole screen canvas.
// Each panel gets its own camera + setViewport + setScissor.
// All cameras look at the SAME shared scene from different azimuths.
// Canvas rotation for each panel is handled by rendering the scene
// from the correct azimuth — NO CSS rotation needed.
//
// OrthographicCamera(-fW, fW, fH, -fH, near, far)
//   fW = frustum half-width in WORLD UNITS (not pixels)
//   fH = fW / aspect  (aspect = canvas panel width / height)
// ════════════════════════════════════════════════════════════════════════

// ── Constants ────────────────────────────────────────────────────────────
var WORLD_HALF   = 16;   // ortho frustum half-width in world units
var CAM_DIST     = 40;   // camera orbit radius in world units
var CAM_ELEV_DEG = 20;   // camera elevation angle (degrees)
var LOOK_AT_Y    = 4.8;  // world-space Y the cameras all point at

var DEFAULT_GEO = {
  floor_count:  3,
  floor_height: 3.2,
  wing_span:    18,
  depth:        14,
  holo_colour: '#00ffe7',
  rot:          0,
  column_grid:  {bays_x: 3, bays_z: 2},
  confidence:   0.85
};

// ── State ─────────────────────────────────────────────────────────────────
var renderer, scene, cameras = {};
var animId = null;
var WS = null, wsReconnTimer = null;
var isLive = false, demoMode = false, demoAngle = 0;
var bimLoaded = false;
var hudTimer = null;
var fpsCount = 0, fpsLast = 0;

// GestureCast
var GC = {
  seq: -1,
  cur:  {theta: 0, phi: 0.32, r: CAM_DIST},
  tgt:  {theta: 0, phi: 0.32, r: CAM_DIST},
  pending: null,
  lastRecv: 0
};

// ── DOM refs (set up after DOM loads) ─────────────────────────────────────
var elSetup, elHoloWrap, elCanvas, elWsUrl, elWsStatus;
var elHud, elWsDot, elWsLabel, elBimInfo, elFps;

// ── Boot ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  elSetup    = document.getElementById('setup');
  elHoloWrap = document.getElementById('holo-wrap');
  elCanvas   = document.getElementById('holo-canvas');
  elWsUrl    = document.getElementById('ws-url');
  elWsStatus = document.getElementById('ws-status');
  elHud      = document.getElementById('hud');
  elWsDot    = document.getElementById('ws-dot');
  elWsLabel  = document.getElementById('ws-label');
  elBimInfo  = document.getElementById('bim-info');
  elFps      = document.getElementById('fps');

  document.getElementById('btn-test').addEventListener('click',   onTestWS);
  document.getElementById('btn-launch').addEventListener('click', onLaunch);
  document.getElementById('btn-demo').addEventListener('click',   onDemo);
  document.getElementById('btn-exit').addEventListener('click',   onExit);

  // Tap anywhere during hologram to flash HUD
  document.addEventListener('click', function() {
    if(isLive) flashHUD();
  });

  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
});

// ── Button handlers ───────────────────────────────────────────────────────
function onTestWS() {
  var url = elWsUrl.value.trim();
  setStatus('● CONNECTING…', '');
  try {
    var ws = new WebSocket(url);
    ws.onopen  = function(){ setStatus('● CONNECTED ✓', 'ok'); ws.close(); };
    ws.onerror = function(){ setStatus('● FAILED — check URL', 'err'); };
    ws.onclose = function(){
      if(elWsStatus.textContent === '● CONNECTING…')
        setStatus('● CLOSED', 'err');
    };
  } catch(e) {
    setStatus('● ERROR: ' + e.message, 'err');
  }
}

function onLaunch() {
  demoMode = false;
  startHologram();
  connectWS(elWsUrl.value.trim());
}

function onDemo() {
  demoMode = true;
  startHologram();
  buildBIM(DEFAULT_GEO);
}

function onExit() {
  stopHologram();
}

// ── Status helper ─────────────────────────────────────────────────────────
function setStatus(msg, cls) {
  elWsStatus.textContent = msg;
  elWsStatus.className = cls;
}

// ── Hologram lifecycle ────────────────────────────────────────────────────
function startHologram() {
  // Show hologram view, hide setup
  elSetup.style.display    = 'none';
  elHoloWrap.style.display = 'block';
  isLive = true;

  initRenderer();
  initScene();
  initCameras();
  startLoop();
  flashHUD();
  tryFullscreen();
}

function stopHologram() {
  isLive = false;

  if(animId){ cancelAnimationFrame(animId); animId = null; }
  if(WS){ WS.close(); WS = null; }
  if(wsReconnTimer){ clearTimeout(wsReconnTimer); wsReconnTimer = null; }

  // Dispose Three.js resources
  if(scene) {
    scene.traverse(function(obj) {
      if(obj.geometry) obj.geometry.dispose();
      if(obj.material) {
        if(Array.isArray(obj.material)) obj.material.forEach(function(m){ m.dispose(); });
        else obj.material.dispose();
      }
    });
  }
  if(renderer) { renderer.dispose(); renderer = null; }
  scene    = null;
  cameras  = {};
  bimLoaded = false;
  demoAngle = 0;
  GC.seq = -1;
  GC.cur  = {theta:0, phi:0.32, r:CAM_DIST};
  GC.tgt  = {theta:0, phi:0.32, r:CAM_DIST};
  GC.pending = null;

  elHoloWrap.style.display = 'none';
  elSetup.style.display    = 'flex';
  exitFullscreen();
  setWSDot(false);
}

// ── Three.js init ─────────────────────────────────────────────────────────
function initRenderer() {
  var W = window.innerWidth;
  var H = window.innerHeight;

  elCanvas.width  = W;
  elCanvas.height = H;

  renderer = new THREE.WebGLRenderer({
    canvas:    elCanvas,
    antialias: true,
    alpha:     false
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H, false);
  renderer.autoClear = false;  // CRITICAL: we clear manually per viewport
  renderer.setClearColor(0x000000, 1);
}

function initScene() {
  scene = new THREE.Scene();
  scene.background = null; // transparent — renderer.clear() handles black

  var ambient  = new THREE.AmbientLight(0x003344, 2.5);
  var dirLight = new THREE.DirectionalLight(0x00ffe7, 1.5);
  dirLight.position.set(10, 20, 10);
  scene.add(ambient);
  scene.add(dirLight);
}

// Each camera orbits the origin from a different azimuth angle.
// The 4 azimuths (N=0, E=90, S=180, W=270) map to the 4 glass panels.
// Panel screen positions for portrait phone layout:
//   north  : top strip     (x=0,   y=0,    w=SW,   h=half)
//   west   : left column   (x=0,   y=half, w=half, h=mid )
//   east   : right column  (x=half,y=half, w=half, h=mid )
//   south  : bottom strip  (x=0,   y=H-half,w=SW,  h=half)
function initCameras() {
  var W    = window.innerWidth;
  var H    = window.innerHeight;
  var half = Math.floor(W / 2);
  var mid  = H - 2 * half;

  // elevation in radians
  var elev = CAM_ELEV_DEG * Math.PI / 180;

  // Panel definitions: id, azimuthDeg, viewport [x,y,w,h] in CSS pixels
  // setViewport uses bottom-left origin in Three.js (WebGL convention),
  // so y_bottomleft = H - (css_top + panel_height)
  var panels = [
    { id:'north', az:  0, vx:0,    vy:H-half,        vw:W,    vh:half },
    { id:'west',  az:270, vx:0,    vy:H-half-mid,     vw:half, vh:mid  },
    { id:'east',  az: 90, vx:half, vy:H-half-mid,     vw:half, vh:mid  },
    { id:'south', az:180, vx:0,    vy:0,              vw:W,    vh:half }
  ];

  panels.forEach(function(p) {
    var aspect = p.vw / p.vh;
    var fW = WORLD_HALF;
    var fH = fW / aspect;

    var cam = new THREE.OrthographicCamera(-fW, fW, fH, -fH, 0.1, 500);

    // Position camera on sphere at azimuth + elevation
    var az = p.az * Math.PI / 180;
    cam.position.set(
      CAM_DIST * Math.sin(az) * Math.cos(elev),
      CAM_DIST * Math.sin(elev),
      CAM_DIST * Math.cos(az) * Math.cos(elev)
    );
    cam.lookAt(0, LOOK_AT_Y, 0);

    // Store viewport info on camera for use in render loop
    cam.userData = { vx:p.vx, vy:p.vy, vw:p.vw, vh:p.vh, az:p.az };

    cameras[p.id] = cam;
  });

  // Store layout for GestureCast
  window._layout = { W:W, H:H, half:half, mid:mid };
}

// ── Render loop ───────────────────────────────────────────────────────────
function startLoop() {
  fpsCount = 0;
  fpsLast  = performance.now();
  animId = requestAnimationFrame(frame);
}

function frame(now) {
  if(!isLive) return;
  animId = requestAnimationFrame(frame);

  // GestureCast: smooth camera orbit
  tickGC(now);

  // Demo rotation
  if(demoMode && bimLoaded) {
    demoAngle += 0.003;
    var bimGrp = scene.getObjectByName('bimGroup');
    if(bimGrp) bimGrp.rotation.y = demoAngle;
  }

  // FPS counter
  fpsCount++;
  if(now - fpsLast >= 700) {
    var fps = Math.round(fpsCount * 1000 / (now - fpsLast));
    fpsCount = 0; fpsLast = now;
    if(elFps) elFps.textContent = fps + 'fps';
  }

  // Render 4 viewports into single canvas
  renderer.clear();
  var ids = ['north','west','east','south'];
  for(var i = 0; i < ids.length; i++) {
    var cam = cameras[ids[i]];
    if(!cam) continue;
    var vd = cam.userData;
    renderer.setViewport(vd.vx, vd.vy, vd.vw, vd.vh);
    renderer.setScissor( vd.vx, vd.vy, vd.vw, vd.vh);
    renderer.setScissorTest(true);
    renderer.render(scene, cam);
  }
}

// ── GestureCast ───────────────────────────────────────────────────────────
// Smooth interpolation of remote theta/phi/radius from WS into all cameras.
var GC_ALPHA = 0.15; // EMA coefficient

function tickGC(now) {
  // Consume pending WS packet
  if(GC.pending !== null) {
    var p = GC.pending;
    GC.pending = null;
    if(p.seq !== undefined && p.seq <= GC.seq) {
      // stale — discard
    } else {
      if(p.seq !== undefined) GC.seq = p.seq;
      GC.tgt.theta = p.theta !== undefined ? p.theta : GC.tgt.theta;
      GC.tgt.phi   = p.phi   !== undefined ? p.phi   : GC.tgt.phi;
      GC.tgt.r     = p.r     !== undefined ? p.r     : (p.radius !== undefined ? p.radius : GC.tgt.r);
      GC.lastRecv  = now;
    }
  }

  // EMA lerp current → target
  GC.cur.theta = GC.cur.theta + GC_ALPHA * (GC.tgt.theta - GC.cur.theta);
  GC.cur.phi   = GC.cur.phi   + GC_ALPHA * (GC.tgt.phi   - GC.cur.phi);
  GC.cur.r     = GC.cur.r     + GC_ALPHA * (GC.tgt.r     - GC.cur.r);

  // Only move cameras if GC is active (got at least one remote packet)
  if(GC.lastRecv === 0) return;

  var elev = GC.cur.phi;
  var r    = GC.cur.r;
  var ids  = ['north','west','east','south'];
  var azimuths = {north:0, west:270, east:90, south:180};
  for(var i = 0; i < ids.length; i++) {
    var id  = ids[i];
    var cam = cameras[id];
    if(!cam) continue;
    var baseAz = azimuths[id] * Math.PI / 180;
    var az = baseAz + GC.cur.theta;
    cam.position.set(
      r * Math.sin(az) * Math.cos(elev),
      r * Math.sin(elev),
      r * Math.cos(az) * Math.cos(elev)
    );
    cam.lookAt(0, LOOK_AT_Y, 0);
  }
}

// ── BIM Builder ───────────────────────────────────────────────────────────
function buildBIM(geo) {
  if(!scene) return;

  // Remove old BIM
  var old = scene.getObjectByName('bimGroup');
  if(old) {
    old.traverse(function(o){
      if(o.geometry) o.geometry.dispose();
      if(o.material) {
        if(Array.isArray(o.material)) o.material.forEach(function(m){m.dispose();});
        else o.material.dispose();
      }
    });
    scene.remove(old);
  }

  var nF  = geo.floor_count  || 3;
  var fH  = geo.floor_height || 3.2;
  var W   = geo.wing_span    || 18;
  var D   = geo.depth        || 14;
  var col = new THREE.Color(geo.holo_colour || '#00ffe7');
  var rotY = (geo.rot || 0) * Math.PI / 180;

  var matLine = new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.9});
  var matSlab = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.07, side:THREE.DoubleSide});
  var matPil  = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.2,  side:THREE.DoubleSide});
  var matFace = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.04, side:THREE.DoubleSide});

  var grp = new THREE.Group();
  grp.name = 'bimGroup';

  // Floor perimeter lines
  for(var i = 0; i <= nF; i++) {
    var y = i * fH;
    var pts = [
      new THREE.Vector3(-W/2, y, -D/2),
      new THREE.Vector3( W/2, y, -D/2),
      new THREE.Vector3( W/2, y,  D/2),
      new THREE.Vector3(-W/2, y,  D/2),
      new THREE.Vector3(-W/2, y, -D/2)
    ];
    grp.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      matLine
    ));
  }

  // Vertical corner edges
  var corners = [[-W/2,-D/2],[W/2,-D/2],[W/2,D/2],[-W/2,D/2]];
  corners.forEach(function(c) {
    var p = [new THREE.Vector3(c[0],0,c[1]), new THREE.Vector3(c[0],nF*fH,c[1])];
    grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(p), matLine));
  });

  // Floor slabs
  var slabGeo = new THREE.PlaneGeometry(W, D);
  for(var i = 0; i <= nF; i++) {
    var slab = new THREE.Mesh(slabGeo, matSlab);
    slab.rotation.x = -Math.PI/2;
    slab.position.y = i * fH;
    grp.add(slab);
  }

  // Columns (pillar grid)
  var baysX = (geo.column_grid && geo.column_grid.bays_x) || Math.max(1, Math.round(W/6));
  var baysZ = (geo.column_grid && geo.column_grid.bays_z) || Math.max(1, Math.round(D/5));
  var sx = W / baysX, sz = D / baysZ;
  var pilGeo = new THREE.BoxGeometry(0.4, nF*fH, 0.4);
  for(var xi = 0; xi <= baysX; xi++) {
    for(var zi = 0; zi <= baysZ; zi++) {
      var pil = new THREE.Mesh(pilGeo, matPil);
      pil.position.set(-W/2 + xi*sx, nF*fH/2, -D/2 + zi*sz);
      grp.add(pil);
    }
  }

  // Façade shell + wireframe
  var facGeo  = new THREE.BoxGeometry(W, nF*fH, D);
  var facMesh = new THREE.Mesh(facGeo, matFace);
  facMesh.position.y = nF*fH/2;
  grp.add(facMesh);

  var wireGeo = new THREE.EdgesGeometry(facGeo);
  var wireMat = new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.3});
  var wire    = new THREE.LineSegments(wireGeo, wireMat);
  wire.position.y = nF*fH/2;
  grp.add(wire);

  grp.rotation.y = rotY;
  scene.add(grp);
  bimLoaded = true;

  // Update HUD info
  if(elBimInfo) {
    elBimInfo.textContent = nF+'F \u00b7 '+W+'\u00d7'+D+'m';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS(url) {
  if(WS && WS.readyState <= 1) { WS.close(); WS = null; }
  if(wsReconnTimer) { clearTimeout(wsReconnTimer); wsReconnTimer = null; }
  try {
    WS = new WebSocket(url);
  } catch(e) {
    setWSDot(false);
    return;
  }
  WS.onopen = function() {
    setWSDot(true);
    WS.send(JSON.stringify({type:'health'}));
    WS.send(JSON.stringify({type:'get_bim'}));
  };
  WS.onclose = function() {
    setWSDot(false);
    if(isLive) {
      wsReconnTimer = setTimeout(function(){ connectWS(url); }, 5000);
    }
  };
  WS.onerror = function() {
    setWSDot(false);
  };
  WS.onmessage = function(e) {
    try {
      handleMsg(JSON.parse(e.data));
    } catch(_) {}
  };
}

function handleMsg(msg) {
  if(!msg || !msg.type) return;
  if(msg.type === 'bim_update' && msg.geometry) {
    buildBIM(msg.geometry);
  } else if(msg.type === 'result') {
    if(msg.data && msg.data.geometry) buildBIM(msg.data.geometry);
  } else if(msg.type === 'geometry' && msg.data) {
    buildBIM(msg.data);
  } else if(msg.type === 'bim_transform') {
    GC.pending = {
      theta: msg.theta,
      phi:   msg.phi,
      r:     msg.radius,
      seq:   msg.seq
    };
  }
}

function setWSDot(online) {
  if(elWsDot)   elWsDot.className   = 'dot' + (online ? ' on' : '');
  if(elWsLabel) elWsLabel.textContent = online ? 'WS ONLINE' : 'WS OFFLINE';
}

// ── HUD flash ─────────────────────────────────────────────────────────────
function flashHUD() {
  if(!elHud) return;
  elHud.classList.remove('hidden');
  if(hudTimer) clearTimeout(hudTimer);
  hudTimer = setTimeout(function(){ elHud.classList.add('hidden'); }, 3500);
}

// ── Fullscreen ────────────────────────────────────────────────────────────
function tryFullscreen() {
  var el = document.documentElement;
  var fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
  if(fn) fn.call(el);
}
function exitFullscreen() {
  var fn = document.exitFullscreen || document.webkitExitFullscreen;
  if(fn) fn.call(document);
}

// Resize
window.addEventListener('resize', function() {
  if(!isLive) return;
  // Re-init renderer and cameras to new size
  var W = window.innerWidth;
  var H = window.innerHeight;
  renderer.setSize(W, H, false);
  elCanvas.width  = W;
  elCanvas.height = H;
  cameras = {};
  initCameras();
});

</script>
</body>
</html>
